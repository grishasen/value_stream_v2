<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Value Stream — ingestion flow</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="_theme.css" />
<style>
  svg .t  { font: 400 14px var(--font-sans); fill: var(--color-text-primary); }
  svg .ts { font: 400 12px var(--font-sans); fill: var(--color-text-secondary); }
  svg .th { font: 500 14px var(--font-sans); fill: var(--color-text-primary); }
  svg .arr { stroke: var(--color-border-secondary); fill: none; stroke-width: 1.5; }
  .c-blue rect   { fill: var(--color-background-info);    stroke: var(--color-text-info); }
  .c-blue text   { fill: var(--color-text-info); }
  .c-teal rect   { fill: #e1f5ee; stroke: #1d9e75; }
  .c-teal text   { fill: #0f6e56; }
  .c-amber rect  { fill: var(--color-background-warning); stroke: var(--color-text-warning); }
  .c-amber text  { fill: var(--color-text-warning); }
  .c-purple rect { fill: #eeedfe; stroke: #7f77dd; }
  .c-purple text { fill: #3c3489; }
  @media (prefers-color-scheme: dark) {
    .c-teal rect   { fill: #04342c; stroke: #5dcaa5; } .c-teal text   { fill: #9fe1cb; }
    .c-purple rect { fill: #26215c; stroke: #afa9ec; } .c-purple text { fill: #cecbf6; }
  }
</style>
</head>
<body>
<div class="valuestream-frame">
  <nav class="crumbs"><a href="index.html">← Mockups</a></nav>
  <h1>Ingestion-to-dashboard flow</h1>
  <p class="lede">From a file landing in the source folder to a fresh number on a tile.</p>
  <svg width="100%" viewBox="0 0 680 580" role="img">
    <title>Value Stream ingestion-to-dashboard flow</title>
    <desc>End-to-end flow from new file to fresh dashboard number, organized in operator/engine/store/user lanes</desc>
    <defs>
      <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
        <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </marker>
    </defs>
    <text class="ts" x="40" y="100">Operator</text>
    <text class="ts" x="40" y="240">Engine</text>
    <text class="ts" x="40" y="380">Store</text>
    <text class="ts" x="40" y="500">User</text>
    <line x1="120" y1="80" x2="120" y2="540" stroke="var(--color-border-tertiary)" stroke-width="0.5" stroke-dasharray="2 4"/>
    <g class="c-amber"><rect x="140" y="80" width="180" height="56" rx="8" stroke-width="0.5"/><text class="th" x="230" y="100" text-anchor="middle" dominant-baseline="central">New file lands</text><text class="ts" x="230" y="118" text-anchor="middle" dominant-baseline="central">interaction-…20240821.zip</text></g>
    <g class="c-amber"><rect x="360" y="80" width="180" height="56" rx="8" stroke-width="0.5"/><text class="th" x="450" y="100" text-anchor="middle" dominant-baseline="central">Run triggered</text><text class="ts" x="450" y="118" text-anchor="middle" dominant-baseline="central">cron · cli · api · ui</text></g>
    <g class="c-blue"><rect x="140" y="220" width="120" height="56" rx="8" stroke-width="0.5"/><text class="th" x="200" y="240" text-anchor="middle" dominant-baseline="central">Discover</text><text class="ts" x="200" y="258" text-anchor="middle" dominant-baseline="central">glob · group_by</text></g>
    <g class="c-blue"><rect x="280" y="220" width="120" height="56" rx="8" stroke-width="0.5"/><text class="th" x="340" y="240" text-anchor="middle" dominant-baseline="central">Read &amp; transform</text><text class="ts" x="340" y="258" text-anchor="middle" dominant-baseline="central">polars lazy</text></g>
    <g class="c-blue"><rect x="420" y="220" width="120" height="56" rx="8" stroke-width="0.5"/><text class="th" x="480" y="240" text-anchor="middle" dominant-baseline="central">Fan out</text><text class="ts" x="480" y="258" text-anchor="middle" dominant-baseline="central">processors · async</text></g>
    <g class="c-blue"><rect x="560" y="220" width="100" height="56" rx="8" stroke-width="0.5"/><text class="th" x="610" y="240" text-anchor="middle" dominant-baseline="central">Compact</text><text class="ts" x="610" y="258" text-anchor="middle" dominant-baseline="central">d→m→summary</text></g>
    <g class="c-teal"><rect x="140" y="360" width="180" height="56" rx="8" stroke-width="0.5"/><text class="th" x="230" y="380" text-anchor="middle" dominant-baseline="central">Partial parquet</text><text class="ts" x="230" y="398" text-anchor="middle" dominant-baseline="central">aggregates/ih/eng/daily</text></g>
    <g class="c-teal"><rect x="340" y="360" width="180" height="56" rx="8" stroke-width="0.5"/><text class="th" x="430" y="380" text-anchor="middle" dominant-baseline="central">Chunks ledger</text><text class="ts" x="430" y="398" text-anchor="middle" dominant-baseline="central">meta/chunks.duckdb</text></g>
    <g class="c-teal"><rect x="540" y="360" width="120" height="56" rx="8" stroke-width="0.5"/><text class="th" x="600" y="380" text-anchor="middle" dominant-baseline="central">DuckDB views</text><text class="ts" x="600" y="398" text-anchor="middle" dominant-baseline="central">v_metric_*</text></g>
    <g class="c-purple"><rect x="140" y="490" width="180" height="56" rx="8" stroke-width="0.5"/><text class="th" x="230" y="510" text-anchor="middle" dominant-baseline="central">Open dashboard</text><text class="ts" x="230" y="528" text-anchor="middle" dominant-baseline="central">tile renders fresh</text></g>
    <g class="c-purple"><rect x="340" y="490" width="180" height="56" rx="8" stroke-width="0.5"/><text class="th" x="430" y="510" text-anchor="middle" dominant-baseline="central">Drill provenance</text><text class="ts" x="430" y="528" text-anchor="middle" dominant-baseline="central">chunk · run · hash</text></g>
    <g class="c-purple"><rect x="540" y="490" width="120" height="56" rx="8" stroke-width="0.5"/><text class="th" x="600" y="510" text-anchor="middle" dominant-baseline="central">Trust the number</text><text class="ts" x="600" y="528" text-anchor="middle" dominant-baseline="central">audit-ready</text></g>
    <line x1="320" y1="108" x2="360" y2="108" class="arr" marker-end="url(#arrow)"/>
    <path d="M 450 136 L 450 180 L 200 180 L 200 220" class="arr" marker-end="url(#arrow)"/>
    <line x1="260" y1="248" x2="280" y2="248" class="arr" marker-end="url(#arrow)"/>
    <line x1="400" y1="248" x2="420" y2="248" class="arr" marker-end="url(#arrow)"/>
    <line x1="540" y1="248" x2="560" y2="248" class="arr" marker-end="url(#arrow)"/>
    <line x1="480" y1="276" x2="230" y2="360" class="arr" marker-end="url(#arrow)"/>
    <line x1="610" y1="276" x2="430" y2="360" class="arr" marker-end="url(#arrow)"/>
    <line x1="610" y1="276" x2="600" y2="360" class="arr" marker-end="url(#arrow)"/>
    <line x1="600" y1="416" x2="230" y2="490" class="arr" marker-end="url(#arrow)"/>
    <line x1="430" y1="416" x2="430" y2="490" class="arr" marker-end="url(#arrow)"/>
    <line x1="600" y1="416" x2="600" y2="490" class="arr" marker-end="url(#arrow)"/>
  </svg>
</div>
</body>
</html>
