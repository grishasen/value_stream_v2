[mypy]
python_version = 3.11
files = src, tests
plugins = pydantic.mypy
warn_unused_configs = true
warn_redundant_casts = true
warn_unused_ignores = true
warn_no_return = true
warn_return_any = true
no_implicit_optional = true
strict_equality = true
check_untyped_defs = true

[mypy-valuestream.expr.translator]
# Polars' Expr operator stubs have ``float | None`` overloads that confuse
# the type checker across ``Expr - Expr`` and ``Expr.dt.*`` chains. The
# runtime is correct (the unit tests evaluate every node and assert the
# output); mypy's stubs noise here is not a real correctness signal.
warn_return_any = false
disable_error_code = union-attr,operator,no-any-return,assignment

[pydantic-mypy]
init_forbid_extra = true
init_typed = true
warn_required_dynamic_aliases = true
