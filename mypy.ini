[mypy]
python_version = 3.11
files = src, tests
plugins = pydantic.mypy
# Let module-specific follow_imports rules apply to stub packages as well as
# Python modules. This is required for the scoped NumPy boundary below.
follow_imports_for_stubs = true
warn_unused_configs = true
warn_redundant_casts = true
warn_unused_ignores = true
warn_no_return = true
warn_return_any = true
no_implicit_optional = true
strict_equality = true
check_untyped_defs = true

[mypy-valuestream.expr.translator]
# Polars' Expr operator stubs have ``float | None`` overloads that confuse
# the type checker across ``Expr - Expr`` and ``Expr.dt.*`` chains. The
# runtime is correct (the unit tests evaluate every node and assert the
# output); mypy's stubs noise here is not a real correctness signal.
warn_return_any = false
disable_error_code = union-attr,operator,no-any-return,assignment

[mypy-numpy,numpy.*]
# NumPy's installed stubs follow the interpreter-specific wheel and may use
# syntax newer than the project's minimum supported Python. Treat NumPy as a
# dependency boundary while continuing to type-check Value Stream as 3.11.
follow_imports = skip

[mypy-pyarrow.*]
# PyArrow does not currently expose a supported py.typed package surface. Keep
# that untyped boundary scoped to PyArrow rather than disabling import checking
# for the application as a whole.
ignore_missing_imports = true

[pydantic-mypy]
init_forbid_extra = true
init_typed = true
warn_required_dynamic_aliases = true
