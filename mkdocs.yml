site_name: Value Stream
site_description: Aggregate-first business intelligence platform
docs_dir: docs
site_dir: site

theme:
  name: material
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - search.suggest
    - search.highlight
    - content.code.copy
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
  - pymdownx.superfences
  - pymdownx.highlight
  - pymdownx.inlinehilite

plugins:
  - search
  - redirects:
      redirect_maps:
        INDEX.md: meta/documentation-guide.md
        PHASE1_WALKTHROUGH.md: tutorials/getting-started.md
        PHASE2_WALKTHROUGH.md: tutorials/distribution-analytics.md
        PHASE3_WALKTHROUGH.md: tutorials/lifecycle-and-funnel-analytics.md
        PHASE4_WALKTHROUGH.md: tutorials/ui-tour.md
        PHASE6_RUNBOOK.md: guides/operations/migration.md
        PEGA_EXPORT_TUTORIAL.md: tutorials/pega-export.md
        BUILDER_TUTORIAL.md: tutorials/builder.md
        ARCHITECTURE.md: concepts/architecture.md
        DOMAIN_MODEL.md: concepts/domain-model.md
        ALGORITHMS.md: reference/algorithms.md
        PROCESSOR_SPECS.md: reference/processors.md
        EXPRESSION_DSL.md: reference/expression-dsl.md
        READERS_AND_FORMATS.md: reference/readers-and-formats.md
        CHART_CATALOG.md: reference/chart-catalog.md
        QA.md: reference/faq.md
        CHAT_WITH_DATA_MLP1.md: design/chat-with-data-mlp1.md
        IMPLEMENTATION_PLAN.md: design/implementation-plan.md
        REPORTING_BACKLOG.md: design/reporting-backlog.md
        KICKOFF_PROMPT.md: design/kickoff-prompt.md
        wiki/index.md: index.md
        wiki/documentation-plan.md: meta/documentation-guide.md
        wiki/product-overview.md: concepts/product-overview.md
        wiki/business-functionality.md: concepts/business-functionality.md
        wiki/user-guide.md: guides/users/running-reports.md
        wiki/technical-overview.md: concepts/architecture-overview.md
        wiki/operations-runbook.md: guides/operations/runbook.md

