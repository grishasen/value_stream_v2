[server]
maxUploadSize = 2048

[client]
toolbarMode = "minimal"
showErrorDetails = "full"
showSidebarNavigation = false

[ui]
hideTopBar = true

[browser]
gatherUsageStats = false

[theme]
base = "light"
primaryColor = "#275DAD"
backgroundColor = "#F7F9FC"
secondaryBackgroundColor = "#EEF3F8"
textColor = "#17202A"
linkColor = "#275DAD"
codeBackgroundColor = "#EEF3F8"
codeTextColor = "#17202A"
font = "-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif"
headingFont = "-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif"
codeFont = "SFMono-Regular, Consolas, Liberation Mono, monospace"
baseRadius = "0.625rem"
buttonRadius = "0.5rem"
# Widget/input boundary — >=3:1 against both the card white and the #EEF3F8
# input fill (WCAG 1.4.11). Cards keep the soft border via theme.py CSS.
borderColor = "#7C8CA0"
dataframeBorderColor = "#7C8CA0"
dataframeHeaderBackgroundColor = "#EEF3F8"
showWidgetBorder = true
blueColor = "#275DAD"
violetColor = "#7C65A9"
greenColor = "#0F766E"
orangeColor = "#C77920"
redColor = "#B84B45"
grayColor = "#52606D"

[theme.dark]
primaryColor = "#365EDB"
backgroundColor = "#0B1220"
secondaryBackgroundColor = "#1C2C43"
codeBackgroundColor = "#1C2C43"
codeTextColor = "#F7FAFF"
textColor = "#F7FAFF"
linkColor = "#4AD4F7"
borderColor = "#7890AA"
dataframeBorderColor = "#7890AA"
dataframeHeaderBackgroundColor = "#223750"
blueColor = "#4B73F0"
violetColor = "#AD87ED"
greenColor = "#45D6A5"
orangeColor = "#F2C14E"
yellowColor = "#F2C14E"
redColor = "#FF8A80"
grayColor = "#B8C4D2"

[theme.light]
primaryColor = "#275DAD"
backgroundColor = "#F7F9FC"
secondaryBackgroundColor = "#EEF3F8"
textColor = "#17202A"
linkColor = "#275DAD"
borderColor = "#7C8CA0"

[theme.light.sidebar]
primaryColor = "#275DAD"
backgroundColor = "#F7F9FC"
secondaryBackgroundColor = "#EEF3F8"
textColor = "#17202A"

[theme.dark.sidebar]
primaryColor = "#365EDB"
backgroundColor = "#0F1A2A"
secondaryBackgroundColor = "#1C2C43"
textColor = "#F7FAFF"
