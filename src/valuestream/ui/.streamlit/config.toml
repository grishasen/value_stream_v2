[server]
maxUploadSize = 2048

[client]
toolbarMode = "minimal"
showErrorDetails = "full"
showSidebarNavigation = false

[ui]
hideTopBar = true

[browser]
gatherUsageStats = false

[theme]
base = "light"
primaryColor = "#2D4A3E"
backgroundColor = "#F5F3EE"
secondaryBackgroundColor = "#E8EBE6"
textColor = "#1A1A1A"
linkColor = "#2D4A3E"
codeBackgroundColor = "#E8EBE6"
codeTextColor = "#1A1A1A"
font = "DM Sans, Inter, Segoe UI, system-ui, sans-serif"
headingFont = "Playfair Display, Georgia, Times New Roman, serif"
baseRadius = "0.875rem"
buttonRadius = "999px"
borderColor = "#D8D4CB"
dataframeBorderColor = "#D8D4CB"
dataframeHeaderBackgroundColor = "#E8EBE6"
showWidgetBorder = true
blueColor = "#0EA5C9"
violetColor = "#7C65A9"
greenColor = "#2D4A3E"
orangeColor = "#C77920"
redColor = "#B84B45"
grayColor = "#5F6670"

[theme.dark]
