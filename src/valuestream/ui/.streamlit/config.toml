[server]
maxUploadSize = 2048

[client]
toolbarMode = "minimal"
showErrorDetails = "full"
showSidebarNavigation = false

[ui]
hideTopBar = true

[browser]
gatherUsageStats = false

[theme]
# Streamlit's light renderer is kept as the startup engine, while the explicit
# palette below supplies the isolated branch's dark visual system.
base = "light"
primaryColor = "#365EDB"
backgroundColor = "#0B1220"
secondaryBackgroundColor = "#1C2C43"
textColor = "#F7FAFF"
linkColor = "#4AD4F7"
codeBackgroundColor = "#1C2C43"
codeTextColor = "#F7FAFF"
font = "Avenir Next, Avenir, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif"
headingFont = "Avenir Next, Avenir, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif"
codeFont = "SFMono-Regular, Consolas, Liberation Mono, monospace"
baseRadius = "0.75rem"
buttonRadius = "0.625rem"
# Widget/input boundary — >=3:1 against both the card and input surfaces.
borderColor = "#7890AA"
dataframeBorderColor = "#7890AA"
dataframeHeaderBackgroundColor = "#223750"
showWidgetBorder = true
blueColor = "#4B73F0"
violetColor = "#AD87ED"
greenColor = "#45D6A5"
orangeColor = "#F2C14E"
yellowColor = "#F2C14E"
redColor = "#FF8A80"
grayColor = "#B8C4D2"

[theme.dark]
primaryColor = "#365EDB"
backgroundColor = "#0B1220"
secondaryBackgroundColor = "#1C2C43"
codeBackgroundColor = "#1C2C43"
codeTextColor = "#F7FAFF"
textColor = "#F7FAFF"
linkColor = "#4AD4F7"
borderColor = "#7890AA"
dataframeBorderColor = "#7890AA"
dataframeHeaderBackgroundColor = "#223750"
blueColor = "#4B73F0"
violetColor = "#AD87ED"
greenColor = "#45D6A5"
