[server]
maxUploadSize = 2048

[client]
toolbarMode = "minimal"
showErrorDetails = "full"
showSidebarNavigation = false

[ui]
hideTopBar = true

[browser]
gatherUsageStats = false

[theme]
base = "light"
primaryColor = "#275DAD"
backgroundColor = "#F7F9FC"
secondaryBackgroundColor = "#EEF3F8"
textColor = "#17202A"
linkColor = "#275DAD"
codeBackgroundColor = "#EEF3F8"
codeTextColor = "#17202A"
font = "-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif"
headingFont = "-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif"
codeFont = "SFMono-Regular, Consolas, Liberation Mono, monospace"
baseRadius = "0.625rem"
buttonRadius = "0.5rem"
# Widget/input boundary — >=3:1 against both the card white and the #EEF3F8
# input fill (WCAG 1.4.11). Cards keep the soft border via theme.py CSS.
borderColor = "#7C8CA0"
dataframeBorderColor = "#7C8CA0"
dataframeHeaderBackgroundColor = "#EEF3F8"
showWidgetBorder = true
blueColor = "#275DAD"
violetColor = "#7C65A9"
greenColor = "#0F766E"
orangeColor = "#C77920"
redColor = "#B84B45"
grayColor = "#52606D"

[theme.dark]
primaryColor = "#6EA8FE"
backgroundColor = "#0B1017"
secondaryBackgroundColor = "#18212C"
codeBackgroundColor = "#18212C"
codeTextColor = "#F3F7FB"
textColor = "#F3F7FB"
linkColor = "#8EB8FF"
borderColor = "#5D7186"
dataframeBorderColor = "#5D7186"
dataframeHeaderBackgroundColor = "#18212C"
blueColor = "#6EA8FE"
violetColor = "#AD87ED"
greenColor = "#4FD1C5"
orangeColor = "#FF8B25"
redColor = "#F14D4C"
grayColor = "#A9B5C2"

[theme.light]
primaryColor = "#275DAD"
backgroundColor = "#F7F9FC"
secondaryBackgroundColor = "#EEF3F8"
textColor = "#17202A"
linkColor = "#275DAD"
borderColor = "#7C8CA0"

[theme.light.sidebar]
primaryColor = "#275DAD"
backgroundColor = "#F7F9FC"
secondaryBackgroundColor = "#EEF3F8"
textColor = "#17202A"

[theme.dark.sidebar]
primaryColor = "#6EA8FE"
backgroundColor = "#0B1017"
secondaryBackgroundColor = "#18212C"
textColor = "#F3F7FB"
